<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>28 Day Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0A0A0F; --surface:#141418; --surface2:#1C1C22; --surface3:#242430;
    --border:rgba(255,255,255,0.08);
    --her:#FF6B9D; --him:#4ECDC4; --accent:#4ECDC4; --accent-soft:rgba(78,205,196,0.15);
    --text:#F0F0F5; --text2:rgba(240,240,245,0.6); --text3:rgba(240,240,245,0.35);
    --green:#30D158; --red:#FF453A; --orange:#FF9F0A; --blue:#0A84FF; --purple:#BF5AF2;
    --radius:20px; --radius-sm:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:52px 20px 14px;border-bottom:1px solid var(--border)}
  .topbar-row{display:flex;align-items:center;justify-content:space-between}
  .app-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
  .toggle-wrap{display:flex;align-items:center;background:var(--surface2);border-radius:100px;padding:3px;gap:2px;border:1px solid var(--border)}
  .toggle-btn{border:none;border-radius:100px;padding:6px 16px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);background:transparent;color:var(--text3)}
  .toggle-btn.her.active{background:var(--her);color:#fff;box-shadow:0 0 20px rgba(255,107,157,.4)}
  .toggle-btn.him.active{background:var(--him);color:#0A0A0F;box-shadow:0 0 20px rgba(78,205,196,.4)}

  .content{padding:20px 16px 120px}
  .screen{display:none}.screen.active{display:block}

  /* HERO */
  .day-hero{background:var(--surface);border-radius:24px;padding:24px;margin-bottom:16px;border:1px solid var(--border);position:relative;overflow:hidden}
  .day-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;opacity:.06;transition:background .3s}
  .day-hero.her-mode::before{background:var(--her)}.day-hero.him-mode::before{background:var(--him)}
  .day-label{font-size:12px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
  .day-number{font-size:56px;font-weight:900;line-height:1;margin-bottom:4px;transition:color .3s}
  .day-number.her-mode{color:var(--her)}.day-number.him-mode{color:var(--him)}
  .day-of-28{font-size:16px;color:var(--text2);font-weight:600;margin-bottom:20px}
  .progress-wrap{margin-bottom:16px}
  .progress-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progress-label{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
  .progress-pct{font-size:13px;font-weight:800;transition:color .3s}
  .progress-pct.her-mode{color:var(--her)}.progress-pct.him-mode{color:var(--him)}
  .progress-track{height:6px;background:var(--surface3);border-radius:100px;overflow:hidden}
  .progress-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1),background .3s}
  .progress-fill.her-mode{background:linear-gradient(90deg,#FF6B9D,#FF9DCB)}
  .progress-fill.him-mode{background:linear-gradient(90deg,#4ECDC4,#7EDDD7)}
  .calorie-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
  .cal-item{background:var(--surface2);border-radius:12px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
  .cal-value{font-size:18px;font-weight:900;display:block;transition:color .3s}
  .cal-value.her-mode{color:var(--her)}.cal-value.him-mode{color:var(--him)}
  .cal-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;display:block}

  .section-header{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:20px 4px 10px}

  /* MEAL CARDS */
  .meal-card{background:var(--surface);border-radius:var(--radius);padding:16px 16px 16px 14px;margin-bottom:10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;-webkit-user-select:none;user-select:none}
  .meal-card:active{transform:scale(.97)}
  .meal-card.completed{border-color:rgba(48,209,88,.3);background:rgba(48,209,88,.05)}
  .meal-emoji-wrap{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .meal-emoji-wrap.bf{background:rgba(255,159,10,.15)}.meal-emoji-wrap.lu{background:rgba(100,210,255,.12)}.meal-emoji-wrap.dn{background:rgba(191,90,242,.12)}
  .meal-info{flex:1;min-width:0}
  .meal-type{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
  .meal-type.bf{color:var(--orange)}.meal-type.lu{color:#64D2FF}.meal-type.dn{color:#BF5AF2}
  .meal-text{font-size:14px;font-weight:700;color:var(--text);line-height:1.45;transition:color .2s}
  .meal-card.completed .meal-text{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--green)}
  .meal-detail{font-size:12px;font-weight:600;color:var(--text3);margin-top:5px;line-height:1.5}
  .meal-cal{font-size:12px;font-weight:800;color:var(--text3);margin-top:4px}
  .checkbox{width:26px;height:26px;border-radius:50%;border:2px solid var(--surface3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1);margin-top:8px}
  .meal-card.completed .checkbox{background:var(--green);border-color:var(--green);box-shadow:0 0 16px rgba(48,209,88,.5)}
  .checkmark{opacity:0;transform:scale(0) rotate(-45deg);transition:all .3s cubic-bezier(.4,0,.2,1);font-size:13px;color:#fff;font-weight:900}
  .meal-card.completed .checkmark{opacity:1;transform:scale(1) rotate(0deg)}

  .day-complete-banner{background:linear-gradient(135deg,rgba(48,209,88,.12),rgba(48,209,88,.06));border:1px solid rgba(48,209,88,.25);border-radius:var(--radius);padding:20px;text-align:center;margin-top:16px;display:none}
  .day-complete-banner.show{display:block}
  .dcb-emoji{font-size:36px;display:block;margin-bottom:8px}
  .dcb-title{font-size:20px;font-weight:900;color:var(--green);margin-bottom:6px}
  .dcb-sub{font-size:14px;color:var(--text2);font-weight:600;line-height:1.5}

  .cheat-btn{width:100%;padding:15px;border-radius:var(--radius);border:1.5px solid rgba(255,69,58,.3);background:rgba(255,69,58,.07);color:var(--red);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
  .cheat-btn:active{transform:scale(.97);background:rgba(255,69,58,.15)}
  .next-day-btn{width:100%;padding:15px;border-radius:var(--radius);border:1.5px solid rgba(78,205,196,.3);background:rgba(78,205,196,.07);color:var(--him);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px}
  .next-day-btn:active{transform:scale(.97);background:rgba(78,205,196,.15)}
  .day-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .prev-day-btn{width:100%;padding:15px;border-radius:var(--radius);border:1.5px solid rgba(255,159,10,.3);background:rgba(255,159,10,.07);color:var(--orange);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
  .prev-day-btn:active{transform:scale(.97);background:rgba(255,159,10,.15)}
  .cheat-log-item{background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border:1px solid rgba(255,69,58,.2);display:flex;align-items:center;gap:12px}
  .cheat-log-icon{font-size:18px;width:34px;height:34px;background:rgba(255,69,58,.1);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .cheat-log-text{font-size:14px;font-weight:600;color:var(--text2);line-height:1.4}
  .cheat-log-text span{color:var(--red);font-weight:800}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.active{opacity:1;pointer-events:all}
  .modal-sheet{width:100%;background:var(--surface);border-radius:28px 28px 0 0;padding:12px 24px 48px;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
  .modal-overlay.active .modal-sheet{transform:translateY(0)}
  .modal-handle{width:40px;height:4px;background:var(--surface3);border-radius:100px;margin:0 auto 24px}
  .modal-title{font-size:22px;font-weight:900;margin-bottom:8px;color:var(--red)}
  .modal-subtitle{font-size:15px;color:var(--text2);font-weight:600;line-height:1.5;margin-bottom:28px}
  .modal-subtitle span{color:var(--text);font-weight:800}
  .modal-actions{display:flex;flex-direction:column;gap:10px}
  .modal-confirm{padding:16px;border-radius:var(--radius);border:none;background:var(--red);color:#fff;font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
  .modal-confirm:active{transform:scale(.97);opacity:.9}
  .modal-cancel{padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:16px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}

  /* CELEBRATION */
  .celebration{position:fixed;inset:0;pointer-events:none;z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
  .celebration.show{opacity:1}
  .celebration-pill{background:var(--green);color:#fff;padding:14px 28px;border-radius:100px;font-size:18px;font-weight:900;box-shadow:0 8px 40px rgba(48,209,88,.5);transform:translateY(20px) scale(.9);transition:transform .4s cubic-bezier(.4,0,.2,1)}
  .celebration.show .celebration-pill{transform:translateY(0) scale(1)}
  .particle{position:fixed;pointer-events:none;z-index:400;animation:fall 1.2s ease-in forwards}
  @keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

  /* OVERVIEW */
  .overview-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:4px}
  .ov-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--surface);color:var(--text3);border:1px solid var(--border);cursor:pointer;transition:all .2s}
  .ov-day.complete{background:rgba(48,209,88,.15);color:var(--green);border-color:rgba(48,209,88,.3)}
  .ov-day.current{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
  .ov-day.cheated{background:rgba(255,69,58,.1);color:var(--red);border-color:rgba(255,69,58,.25)}
  .ov-day.future{opacity:.35}
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
  .stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;border:1px solid var(--border)}
  .stat-val{font-size:32px;font-weight:900;color:var(--accent)}
  .stat-lbl{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}

  /* SHOPPING */
  .shop-hero{background:var(--surface);border-radius:24px;padding:20px;margin-bottom:14px;border:1px solid var(--border)}
  .shop-hero-title{font-size:26px;font-weight:900;margin-bottom:4px}
  .shop-hero-sub{font-size:14px;color:var(--text2);font-weight:600;margin-bottom:14px}
  .week-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .week-tab{padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;color:var(--text3);cursor:pointer;transition:all .2s}
  .week-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 14px rgba(10,132,255,.4)}
  .shop-progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .shop-pct{font-size:13px;font-weight:800;color:var(--blue)}
  .shop-count{font-size:12px;font-weight:700;color:var(--text3)}
  .shop-track{height:5px;background:var(--surface3);border-radius:100px;overflow:hidden;margin-top:6px}
  .shop-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#0A84FF,#64D2FF);transition:width .5s cubic-bezier(.4,0,.2,1)}

  .shop-category{margin-bottom:8px}
  .cat-header{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .2s}
  .cat-header:active{background:var(--surface3)}
  .cat-icon{font-size:18px;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .cat-label{flex:1;font-size:15px;font-weight:800}
  .cat-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:100px;background:var(--surface3);color:var(--text3)}
  .cat-badge.done-badge{background:rgba(48,209,88,.15);color:var(--green)}
  .cat-chevron{font-size:13px;color:var(--text3);transition:transform .25s;display:inline-block}
  .cat-header.open .cat-chevron{transform:rotate(90deg)}
  .cat-items{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
  .cat-items.open{max-height:3000px}

  .shop-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;cursor:pointer;transition:all .15s;border-bottom:1px solid var(--border);background:var(--surface);-webkit-user-select:none;user-select:none}
  .shop-item:last-child{border-bottom:none;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
  .shop-item:active{background:var(--surface2)}
  .shop-item.bought{background:rgba(48,209,88,.04)}
  .shop-item.bought .si-name{text-decoration:line-through;text-decoration-color:var(--green);color:var(--text3)}
  .si-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--surface3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .22s cubic-bezier(.4,0,.2,1);margin-top:1px}
  .shop-item.bought .si-check{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(48,209,88,.45)}
  .si-checkmark{opacity:0;transform:scale(0);transition:all .22s;font-size:12px;color:#fff;font-weight:900}
  .shop-item.bought .si-checkmark{opacity:1;transform:scale(1)}
  .si-info{flex:1;min-width:0}
  .si-name{font-size:15px;font-weight:700;transition:all .2s;line-height:1.3}
  .si-qty{font-size:12px;font-weight:600;color:var(--text3);margin-top:3px;line-height:1.4}
  .si-tag{font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;margin-top:2px}
  .si-tag.both{background:rgba(191,90,242,.15);color:#BF5AF2}
  .si-tag.him{background:rgba(78,205,196,.15);color:var(--him)}
  .si-tag.her{background:rgba(255,107,157,.15);color:var(--her)}

  .add-item-row{display:flex;gap:8px;margin-bottom:10px}
  .add-item-input{flex:1;padding:12px 14px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:border-color .2s}
  .add-item-input:focus{border-color:var(--blue)}
  .add-item-input::placeholder{color:var(--text3)}
  .add-item-btn{padding:12px 18px;border-radius:var(--radius-sm);background:var(--blue);border:none;color:#fff;font-size:22px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center}
  .add-item-btn:active{transform:scale(.93);opacity:.85}
  .clear-bought-btn{width:100%;margin-top:14px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
  .clear-bought-btn:active{background:var(--surface2)}

  /* NAV */
  .nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 20px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
  .nav-btn{flex:1;padding:8px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
  .nav-btn .nav-icon{font-size:22px}
  .nav-btn.active{color:var(--accent)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title">28 Day Plan</span>
    <div class="toggle-wrap">
      <button class="toggle-btn her" id="herBtn" onclick="setMode('her')">Her</button>
      <button class="toggle-btn him active" id="himBtn" onclick="setMode('him')">Him</button>
    </div>
  </div>
</div>

<!-- TODAY -->
<div class="screen active" id="screen-today">
  <div class="content">
    <div class="day-hero him-mode" id="dayHero">
      <div class="day-label">Today</div>
      <div class="day-number him-mode" id="dayNum">1</div>
      <div class="day-of-28" id="dayOf28">of 28</div>
      <div class="progress-wrap">
        <div class="progress-label-row">
          <span class="progress-label">Daily Progress</span>
          <span class="progress-pct him-mode" id="progressPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill him-mode" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="calorie-row">
        <div class="cal-item"><span class="cal-value him-mode" id="calEaten">0</span><span class="cal-lbl">Eaten</span></div>
        <div class="cal-item"><span class="cal-value him-mode" id="calRemain">0</span><span class="cal-lbl">Left</span></div>
        <div class="cal-item"><span class="cal-value him-mode" id="calTarget">0</span><span class="cal-lbl">Target</span></div>
      </div>
    </div>
    <div class="section-header">Meals</div>
    <div id="mealCards"></div>
    <div class="day-complete-banner" id="dayCompleteBanner">
      <span class="dcb-emoji">🎯</span>
      <div class="dcb-title">Day Complete!</div>
      <div class="dcb-sub" id="dayCompleteMsg"></div>
    </div>
    <div style="margin-top:20px">
      <div class="day-nav-row">
        <button class="prev-day-btn" onclick="prevDay()">⬅️ Prev Day</button>
        <button class="next-day-btn" onclick="nextDay()">➡️ Next Day</button>
      </div>
      <button class="cheat-btn" onclick="openCheatModal()">🍕 I Cheated Today</button>
    </div>
    <div id="cheatLogSection"></div>
  </div>
</div>

<!-- OVERVIEW -->
<div class="screen" id="screen-overview">
  <div class="content">
    <div class="section-header" style="margin-top:8px">All 28 Days</div>
    <div class="overview-grid" id="overviewGrid"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="statDaysComplete">0</div><div class="stat-lbl">Days Done</div></div>
      <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">Streak</div></div>
      <div class="stat-card"><div class="stat-val" id="statCheats">0</div><div class="stat-lbl">Cheats</div></div>
      <div class="stat-card"><div class="stat-val" id="statDaysLeft">28</div><div class="stat-lbl">Days Left</div></div>
    </div>
  </div>
</div>

<!-- SHOPPING -->
<div class="screen" id="screen-shop">
  <div class="content">
    <div class="shop-hero">
      <div class="shop-hero-title">🛒 Shopping List</div>
      <div class="shop-hero-sub">Tap a week to see exactly what to buy</div>
      <div class="week-tabs">

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  mode:'him',
  sequence:Array.from({length:28},(_,i)=>i),
  cheatedDays:[],
  completedMeals:{},
  boughtItems:{},
  customItems:[],
  openCats:{},
  activeWeek:'all',
  dayOffset:0,
};
const save=()=>localStorage.setItem('mp28v3',JSON.stringify(S));
const load=()=>{const s=localStorage.getItem('mp28v3');if(s)try{S=JSON.parse(s);}catch(e){}};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const todayPos=()=>{const n=new Date();n.setHours(0,0,0,0);const base=Math.floor((n-START_DATE)/86400000);return Math.max(0,Math.min(base+(S.dayOffset||0),S.sequence.length-1));};
const curPlanIdx=()=>S.sequence[todayPos()]??0;
const activePlan=()=>S.mode==='her'?herPlan:hisPlan;
const activeCals=()=>S.mode==='her'?herCals:hisCals;
const mealKey=(pi,m)=>`${S.mode}_${pi}_${m}`;
const dayComplete=pos=>{const pi=S.sequence[pos];return['bf','lu','dn'].every(m=>S.completedMeals[mealKey(pi,m)]);};
const mealsDone=pi=>['bf','lu','dn'].filter(m=>S.completedMeals[mealKey(pi,m)]).length;

// ── RENDER TODAY ──────────────────────────────────────────────────────────────
function render(){
  const isHim=S.mode==='him',mc=isHim?'him-mode':'her-mode';
  document.getElementById('herBtn').className=`toggle-btn her${S.mode==='her'?' active':''}`;
  document.getElementById('himBtn').className=`toggle-btn him${S.mode==='him'?' active':''}`;
  const sp=todayPos(),pi=curPlanIdx(),plan=activePlan(),cals=activeCals(),day=plan[pi],tc=cals[pi];
  const hero=document.getElementById('dayHero');
  hero.className=`day-hero ${mc}`;
  document.getElementById('dayNum').className=`day-number ${mc}`;
  document.getElementById('dayNum').textContent=sp+1;
  document.getElementById('dayOf28').textContent=`of ${S.sequence.length}${S.sequence.length>28?' (extended)':''}`;
  const done=mealsDone(pi),pct=Math.round(done/3*100);
  const ppct=document.getElementById('progressPct');
  ppct.className=`progress-pct ${mc}`;ppct.textContent=pct+'%';
  const pf=document.getElementById('progressFill');pf.className=`progress-fill ${mc}`;pf.style.width=pct+'%';
  const eaten=(S.completedMeals[mealKey(pi,'bf')]?tc.bf:0)+(S.completedMeals[mealKey(pi,'lu')]?tc.lu:0)+(S.completedMeals[mealKey(pi,'dn')]?tc.dn:0);
  const target=tc.bf+tc.lu+tc.dn;
  ['calEaten','calRemain','calTarget'].forEach(id=>{const el=document.getElementById(id);el.className=`cal-value ${mc}`;});
  document.getElementById('calEaten').textContent=eaten;
  document.getElementById('calRemain').textContent=Math.max(0,target-eaten);
  document.getElementById('calTarget').textContent=target;

  const meals=[{key:'bf',emoji:'🍳',label:'Breakfast',cls:'bf'},{key:'lu',emoji:'🥗',label:'Lunch',cls:'lu'},{key:'dn',emoji:'🍽️',label:'Dinner',cls:'dn'}];
  const cont=document.getElementById('mealCards');cont.innerHTML='';
  meals.forEach(m=>{
    const meal=day[m.key],isDone=!!S.completedMeals[mealKey(pi,m.key)];
    const c=document.createElement('div');c.className=`meal-card${isDone?' completed':''}`;
    c.innerHTML=`<div class="meal-emoji-wrap ${m.cls}">${m.emoji}</div><div class="meal-info"><div class="meal-type ${m.cls}">${m.label}</div><div class="meal-text">${meal.t}</div><div class="meal-detail">${meal.d.replace(/\n/g,'<br>')}</div><div class="meal-cal">~${cals[pi][m.key]} kcal</div></div><div class="checkbox"><span class="checkmark">✓</span></div>`;
    c.addEventListener('click',()=>toggleMeal(pi,m.key));cont.appendChild(c);
  });

  const allDone=done===3;
  const banner=document.getElementById('dayCompleteBanner');banner.className=`day-complete-banner${allDone?' show':''}`;
  if(allDone){const msgs=["All 3 meals done. Clean day logged.","Solid execution. Come back tomorrow.","Three for three. That's the standard.","Perfect day. Keep the streak going.","Done. No excuses needed today."];document.getElementById('dayCompleteMsg').textContent=msgs[pi%msgs.length];}
  renderCheatLog();renderOverview();
}

function renderCheatLog(){
  const s=document.getElementById('cheatLogSection');
  if(!S.cheatedDays.length){s.innerHTML='';return;}
  let h='<div class="section-header">Cheat Log</div>';
  S.cheatedDays.forEach(c=>{h+=`<div class="cheat-log-item"><div class="cheat-log-icon">🍕</div><div class="cheat-log-text">Day <span>${c.originalDay}</span> cheated — redo at position <span>${c.movedToPosition}</span></div></div>`;});
  s.innerHTML=h;
}

function renderOverview(){
  const grid=document.getElementById('overviewGrid');const sp=todayPos();grid.innerHTML='';
  S.sequence.forEach((pi,pos)=>{
    const div=document.createElement('div');let cls='ov-day';
    if(dayComplete(pos))cls+=' complete';
    else if(pos===sp)cls+=' current';
    else if(pos>sp)cls+=' future';
    if(S.cheatedDays.some(c=>c.movedToPosition-1===pos)&&!dayComplete(pos))cls+=' cheated';
    div.className=cls;div.textContent=pos+1;grid.appendChild(div);
  });
  let dc=0,ls=0;
  for(let i=0;i<=todayPos();i++){if(dayComplete(i)){dc++;ls++;}else ls=0;}
  document.getElementById('statDaysComplete').textContent=dc;
  document.getElementById('statStreak').textContent=ls;
  document.getElementById('statCheats').textContent=S.cheatedDays.length;
  document.getElementById('statDaysLeft').textContent=Math.max(0,S.sequence.length-todayPos()-1);
}

// ── SHOPPING ──────────────────────────────────────────────────────────────────
function renderShop(){
  const w=S.activeWeek;
  // update tabs
  const tabVals=['all',1,2,3,4];
  document.querySelectorAll('.week-tab').forEach((btn,i)=>{btn.className='week-tab'+(S.activeWeek===tabVals[i]?' active':'');});

  // build categories with filtered items
  const allCats=SHOP_CATS.map(cat=>({
    ...cat,
    items:cat.items.filter(it=>w==='all'||it.weeks.includes(w))
  })).filter(cat=>cat.items.length>0);

  // custom items
  if(S.customItems.length){
    allCats.push({id:'custom',label:'My Items',icon:'✏️',color:'rgba(255,214,10,0.1)',border:'#FFD60A',
      items:S.customItems.map(i=>({...i,weeks:[1,2,3,4]}))});
  }

  let total=0,bought=0;
  allCats.forEach(cat=>cat.items.forEach(it=>{total++;if(S.boughtItems[it.id])bought++;}));
  const pct=total?Math.round(bought/total*100):0;
  document.getElementById('shopPct').textContent=pct+'%';
  document.getElementById('shopCount').textContent=`${bought} / ${total} items`;
  document.getElementById('shopFill').style.width=pct+'%';

  const cont=document.getElementById('shopCategories');cont.innerHTML='';
  allCats.forEach(cat=>{
    const boughtN=cat.items.filter(it=>S.boughtItems[it.id]).length;
    const allB=boughtN===cat.items.length;
    const isOpen=S.openCats[cat.id]!==false;
    const wrap=document.createElement('div');wrap.className='shop-category';
    const hdr=document.createElement('div');hdr.className='cat-header'+(isOpen?' open':'');
    hdr.style.borderLeft=`3px solid ${cat.border}`;
    hdr.innerHTML=`<div class="cat-icon" style="background:${cat.color}">${cat.icon}</div><span class="cat-label">${cat.label}</span><span class="cat-badge${allB?' done-badge':''}">${boughtN}/${cat.items.length}</span><span class="cat-chevron">›</span>`;
    hdr.addEventListener('click',()=>{S.openCats[cat.id]=!isOpen;save();renderShop();});
    const iWrap=document.createElement('div');iWrap.className='cat-items'+(isOpen?' open':'');
    cat.items.forEach(it=>{
      const isBought=!!S.boughtItems[it.id];
      const d=document.createElement('div');d.className='shop-item'+(isBought?' bought':'');
      d.innerHTML=`<div class="si-check"><span class="si-checkmark">✓</span></div><div class="si-info"><div class="si-name">${it.name}</div><div class="si-qty">${it.qty}</div></div><span class="si-tag ${it.tag}">${it.tag==='both'?'Both':it.tag==='him'?'Him':'Her'}</span>`;
      d.addEventListener('click',()=>{S.boughtItems[it.id]=!S.boughtItems[it.id];save();renderShop();});
      iWrap.appendChild(d);
    });
    wrap.appendChild(hdr);wrap.appendChild(iWrap);cont.appendChild(wrap);
  });
}

function setWeek(w){S.activeWeek=w;save();renderShop();}
function addCustomItem(){const inp=document.getElementById('addItemInput');const v=inp.value.trim();if(!v)return;S.customItems.push({id:'c_'+Date.now(),name:v,qty:'Custom item',tag:'both'});inp.value='';save();renderShop();spawnConfetti();}
function clearBought(){Object.keys(S.boughtItems).forEach(k=>delete S.boughtItems[k]);save();renderShop();}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleMeal(pi,meal){
  const key=mealKey(pi,meal),was=!!S.completedMeals[key];
  S.completedMeals[key]=!was;save();
  if(!was){const msgs={bf:['Breakfast done ✓','Morning sorted ✓'],lu:['Lunch done ✓','Halfway there ✓'],dn:['Dinner done ✓','Clean day 🎯']};showCelebration(msgs[meal][Math.floor(Math.random()*2)]);spawnConfetti();}
  render();
}
function setMode(m){S.mode=m;save();render();}
function nextDay(){if(todayPos()<S.sequence.length-1){S.dayOffset=(S.dayOffset||0)+1;save();render();}}
function prevDay(){if(todayPos()>0){S.dayOffset=(S.dayOffset||0)-1;save();render();}}
function openCheatModal(){const sp=todayPos(),np=S.sequence.length+1;document.getElementById('cheatModalText').innerHTML=`Marking <span>Day ${sp+1}</span> as a cheat day.<br><br>It moves to <span>Day ${np}</span>. Plan extends to <span>${np} days</span>.`;document.getElementById('cheatModal').classList.add('active');}
function closeCheatModal(){document.getElementById('cheatModal').classList.remove('active');}
function confirmCheat(){const sp=todayPos(),pi=S.sequence[sp],np=S.sequence.length+1;['bf','lu','dn'].forEach(m=>delete S.completedMeals[mealKey(pi,m)]);S.sequence.push(pi);S.cheatedDays.push({originalDay:sp+1,movedToPosition:np});save();closeCheatModal();render();}
function showCelebration(msg){const c=document.getElementById('celebration'),t=document.getElementById('celebrationText');t.textContent=msg;c.classList.add('show');setTimeout(()=>c.classList.remove('show'),1800);}
function spawnConfetti(){const cols=['#4ECDC4','#FF6B9D','#FFD700','#30D158','#FF9F0A','#BF5AF2'];for(let i=0;i<18;i++){setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[~~(Math.random()*6)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'4px'};animation-duration:${.8+Math.random()*.8}s;animation-delay:${Math.random()*.3}s;`;document.body.appendChild(p);setTimeout(()=>p.remove(),1500);},i*40);}}
function showScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`screen-${name}`).classList.add('active');document.getElementById(`nav${name.charAt(0).toUpperCase()+name.slice(1)}`).classList.add('active');if(name==='shop')renderShop();if(name==='overview')renderOverview();}

document.getElementById('addItemInput').addEventListener('keydown',e=>{if(e.key==='Enter')addCustomItem();});
load();render();
</script>
